.quot-row-num{font-size:12px;font-weight:600;color:var(--muted)}

.quot-comm-display{font-size:12px;padding:4px 0}
.quot-comm-label{color:var(--text-secondary);font-weight:600}
.quot-comm-val{font-weight:700;color:var(--green)}

.quot-spec-label{font-weight:600;color:var(--text)}
.quot-actions{display:flex;gap:6px;margin-bottom:12px}
.quot-btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .2s}
.quot-btn-primary{background:linear-gradient(135deg,#1a56db,#2563eb);color:#fff}
.quot-btn-secondary{background:#f1f5f9;color:var(--text-secondary)}
.quot-btn:hover{opacity:.9}
.quot-preview{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;font-size:12px;color:#334155;max-height:75vh;overflow-y:auto}
.quot-preview-empty{text-align:center;color:var(--muted);font-size:14px;padding:60px 20px}
.quot-preview .q-preview h1{font-size:15px;font-weight:800;text-align:center;color:#0f1b3d;margin-bottom:4px}
.quot-preview .q-preview .q-sub{text-align:center;color:#64748b;font-size:11px;line-height:1.6;margin-bottom:6px}
.quot-preview .q-preview .q-divider{height:2px;background:linear-gradient(90deg,transparent,#1a56db,transparent);margin:10px 0}
.quot-preview .q-preview table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px}
.quot-preview .q-preview th{background:#f1f5f9;text-align:left;padding:6px 5px;font-size:10px;text-transform:uppercase;color:#475569;border:1px solid #e2e8f0}
.quot-preview .q-preview td{padding:6px 5px;border:1px solid #e2e8f0}
.quot-preview .q-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #f1f5f9}
.quot-preview .q-row strong{color:#1e293b}
.quot-preview .q-row span{color:#475569}
.quot-preview .q-terms{margin-top:8px}
.quot-preview .q-footer{margin-top:12px;font-size:10px;color:#94a3b8;line-height:1.6}
