<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center}.c{background:#fff;border-radius:24px;padding:48px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:420px;width:90%}.c h1{font-size:24px;margin:0 0 4px;color:#1e293b}.c p{color:#64748b;margin:0 0 36px;font-size:14px}.g{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}.b{display:flex;flex-direction:column;align-items:center;gap:6px;padding:20px 28px;border:2px solid #e2e8f0;border-radius:16px;cursor:pointer;background:#fff;transition:all .2s;text-decoration:none;color:#1e293b;min-width:120px}.b:hover{border-color:#667eea;background:#f8fafc;transform:translateY(-2px);box-shadow:0 4px 12px rgba(102,126,234,.3)}.f{font-size:40px}.n{font-weight:600;font-size:16px}</style></head><body><div class="c"><h1>🌐 Price Check Tool</h1><p>Tiếng Việt · English · 中文</p><div class="g"><a class="b" href="vi.html" onclick="localStorage.setItem('dt_lang','vi')"><span class="f">🇻🇳</span><span class="n">Tiếng Việt</span></a><a class="b" href="en.html" onclick="localStorage.setItem('dt_lang','en')"><span class="f">🇬🇧</span><span class="n">English</span></a><a class="b" href="zh.html" onclick="localStorage.setItem('dt_lang','zh')"><span class="f">🇨🇳</span><span class="n">中文</span></a></div><div style="margin-top:24px;font-size:11px;color:#94a3b8" id="m">Redirecting...</div><script>try{var l=localStorage.getItem("dt_lang");if(l==="en")location.href="en.html";else if(l==="zh")location.href="zh.html";else document.getElementById("m").style.display="none"}catch(e){}</script></div></body></html>
